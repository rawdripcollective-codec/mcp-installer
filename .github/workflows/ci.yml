name: Node.js CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then npm ci
          elif [ -f yarn.lock ]; then yarn install --frozen-lockfile
          elif [ -f pnpm-lock.yaml ]; then corepack enable && pnpm install --frozen-lockfile
          else npm install
          fi

      - name: ESLint
        run: |
          if [ -f .eslintrc* ] || [ -f eslint.config* ]; then
            npx eslint . --ext .ts,.tsx,.js,.jsx --max-warnings=0
          else
            echo "No ESLint config found, installing and running with defaults"
            npm install --save-dev eslint @typescript-eslint/parser @typescript-eslint/eslint-plugin
            npx eslint . --ext .ts,.tsx,.js,.jsx || true
          fi

      - name: Prettier check
        run: |
          if [ -f .prettierrc* ] || [ -f prettier.config* ]; then
            npx prettier --check .
          else
            echo "No Prettier config, running check with defaults"
            npx prettier --check "**/*.{ts,tsx,js,jsx,json,md}" || true
          fi

  build:
    name: Build (Node ${{ matrix.node-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20", "22"]
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then npm ci
          elif [ -f yarn.lock ]; then yarn install --frozen-lockfile
          else npm install
          fi
        shell: bash

      - name: Build
        run: |
          if npm run | grep -q "^  build$"; then
            npm run build
          else
            echo "No build script found, skipping"
          fi
        shell: bash

      - name: Type check
        run: |
          if [ -f tsconfig.json ]; then
            npx tsc --noEmit
          fi
        shell: bash

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then npm ci
          elif [ -f yarn.lock ]; then yarn install --frozen-lockfile
          else npm install
          fi

      - name: Run tests
        run: |
          if npm run | grep -q "^  test$"; then
            npm test -- --coverage --passWithNoTests
          else
            echo "No test script found, skipping"
          fi

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: false

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: npm audit
        run: |
          if [ -f package-lock.json ]; then
            npm ci
            npm audit --audit-level=high || true
          else
            echo "No package-lock.json found"
          fi
